<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <title>cubeTimer</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600&display=swap" />
  <link rel="stylesheet" href="css/timer.css" />
</head>
<body>

  <header id="header">
    <span class="logo">cube<strong>Timer</strong></span>
    <div class="header-controls">

      <label class="toggle-option" title="Single tap to start instead of hold">
        <input type="checkbox" id="tap-mode-enabled" />
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
        <span class="toggle-label">Tap</span>
      </label>

      <label class="toggle-option" title="WCA 15s inspection">
        <input type="checkbox" id="inspection-enabled" />
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
        <span class="toggle-label">Inspection</span>
      </label>

      <label class="toggle-option" title="Voice and beeps during inspection">
        <input type="checkbox" id="narrator-enabled" />
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
        <span class="toggle-label">Audio</span>
      </label>

      <label class="toggle-option" title="Cube net preview">
        <input type="checkbox" id="cube-preview-enabled" />
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
        <span class="toggle-label">Cube</span>
      </label>

      <button id="theme-toggle" aria-label="Toggle theme">
        <svg id="icon-sun"  xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <div class="scramble-bar" id="scramble-bar">
    <span class="scramble-seq" id="scramble-seq"></span>
    <button class="scramble-refresh" id="scramble-refresh" aria-label="New scramble">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    </button>
  </div>

  <div class="layout">

    <main>
      <div class="arena" id="arena" data-state="idle">
        <time class="display" id="display" datetime="PT0S">0.00</time>
        <div class="penalty-bar">
          <span class="penalty" id="penalty-text"></span>
        </div>
        <div class="manual-penalty-bar" id="manual-penalty-bar">
          <button class="manual-penalty-btn" id="btn-plus2">+2</button>
          <button class="manual-penalty-btn manual-penalty-btn--dnf" id="btn-dnf">DNF</button>
        </div>
      </div>

      <div class="ao5-block" id="ao5-block">
        <span class="ao5-label">ao5</span>
        <span class="ao5-value" id="ao5-display">—</span>
      </div>
    </main>

    <aside id="sidebar">
      <div id="cube-net-wrap" class="cube-net-wrap hidden">
        <svg id="cube-net" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>

      <div class="sidebar-stats">
        <div class="stat-row">
          <span class="stat-label">ao5</span>
          <span class="stat-value" id="stat-ao5">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">ao12</span>
          <span class="stat-value" id="stat-ao12">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">ao100</span>
          <span class="stat-value" id="stat-ao100">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">mean</span>
          <span class="stat-value" id="stat-mean">—</span>
        </div>
      </div>

      <div class="sidebar-history">
        <div class="history-header">
          <span class="history-title">History</span>
          <button id="clear-history">clear</button>
        </div>
        <ol id="history-list" class="history-list"></ol>
      </div>
    </aside>

  </div>

  <script type="module" src="js/timer.js"></script>
</body>
</html>
